name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: python -m pip install "ruff>=0.6,<1.0"
      - name: ruff format --check
        run: ruff format --check .
      - name: ruff check
        run: ruff check .

  type-check:
    name: Type-check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - run: mypy ooc_optimizer

  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
      - name: Run pytest (unit + integration, no OpenFOAM)
        run: |
          pytest -q \
            --deselect tests/test_verification.py::TestOpenFOAMIntegration \
            --deselect tests/test_cfd.py \
            --deselect tests/test_geometry.py::TestGeometryValidation \
            --deselect tests/test_geometry.py::TestGeometryGeneration \
            --deselect tests/test_meshing.py \
            --cov=ooc_optimizer --cov-report=xml --cov-report=term
      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  smoke-cli:
    name: Smoke-test tumor-chip CLI
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
      - name: tumor-chip version
        run: tumor-chip version
      - name: tumor-chip --help
        run: tumor-chip --help
