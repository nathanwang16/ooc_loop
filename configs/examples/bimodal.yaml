# Target-profile example: bimodal (rim + rim) profile.
# Inherits defaults from configs/default_config.yaml; only the target block
# is overridden when loaded by scripts/run_optimization.py --target bimodal.

target_profile:
  kind: bimodal
  peak_axis: x
  peak_fracs: [0.25, 0.75]
  width_frac: 0.1
  c_peak: 1.0
  c_base: 0.0
