# OoC-Optimizer Default Configuration (v2)
# =========================================
# All parameters match Development Guide v2 specifications.
# The v1 pipeline (WSS uniformity) is retained as an exemplar under
# examples/wss_uniformity/ and uses a separate config file.

fixed_parameters:
  chamber_length_um: 10000       # L = 10 mm (fixed)
  inlet_width_um: 500            # W_in = 500 μm standard tubing ID
  fluid_viscosity_Pa_s: 0.001    # μ = 0.001 Pa·s (culture media ≈ water)
  fluid_density_kg_m3: 1000      # ρ = 1000 kg/m³

# Passive-scalar diffusivity for the drug / tracer.  Small-molecule drug
# surrogate by default; 1×10⁻¹¹ – 1×10⁻⁹ documented range for sensitivity.
diffusivity: 1.0e-10             # [m²/s]

continuous_bounds:
  W:                            # Chamber width (μm)
    min: 500
    max: 3000
  d_p:                          # Pillar diameter (μm)
    min: 100
    max: 400
  s_p:                          # Pillar gap / center-to-center (μm)
    min: 200
    max: 1000
  theta:                        # Inlet taper angle (degrees)
    min: 15
    max: 75
  Q_total:                      # Total flow rate (μL/min)
    min: 5
    max: 200
  r_flow:                       # Q_drug / Q_total
    min: 0.1
    max: 0.9
  delta_W:                      # Inlet separation normalised by W (only used for 'opposing')
    min: 0.1
    max: 0.45

discrete_levels:
  pillar_config: ["none", "1x4", "2x4", "3x6"]
  chamber_height: [200, 300]    # μm
  inlet_topology: ["opposing", "same_side_Y", "asymmetric_lumen"]

# Primary target profile for the first BO sweep across all 24 configurations.
# The orchestrator then re-runs the winning topology on the remaining two
# profiles (defined in extra_target_profiles).
target_profile:
  kind: linear_gradient
  axis: x
  c_high: 1.0
  c_low: 0.0

extra_target_profiles:
  - kind: bimodal
    peak_axis: x
    peak_fracs: [0.25, 0.75]
    width_frac: 0.1
    c_peak: 1.0
    c_base: 0.0
  - kind: step
    step_axis: x
    step_frac: 0.5
    sharpness_frac: 0.05
    c_high: 1.0
    c_low: 0.0

solver_settings:
  convergence_criterion: 1.0e-6
  max_iterations: 2000
  mesh_resolution: 1            # 1 = default; higher values refine
  solver_timeout_s: 300
  snappy_enable_snap: true
  snappy_n_cells_between_levels: 3
  snappy_resolve_feature_angle: 20
  snappy_location_in_mesh: "(0.001 0.0002 0.000005)"
  snappy_n_smooth_patch: 5
  snappy_n_solve_iter: 100
  snappy_n_relax_iter: 8
  snappy_n_feature_snap_iter: 15
  mesh_max_failed_checks: 0
  mesh_max_non_ortho: 65.0
  mesh_max_concave_cells: 0

optimization:
  n_sobol_init: 20              # v2: 20 Sobol init
  n_bo_iterations: 40           # v2: 40 BO iterations
  total_per_config: 60
  constraints:
    tau_mean_min: 0.1           # relaxed vs v1 (drug transport is less WSS-sensitive)
    tau_mean_max: 2.0
    f_dead_max: 0.05
  penalty_L2: 99.0
  penalty_cv_tau: 999.0

interpretability:
  sobol_n_samples: 1024
  tolerance_loss_tolerance: 0.1
  validate_top_k: 3
  bootstrap_n: 200

paths:
  template_case: "ooc_optimizer/cfd/template"
  stl_output_dir: "data/stl"
  case_output_dir: "data/cases"
  results_dir: "data/results"
  evaluation_log: "data/results/evaluations.jsonl"
  figures_dir: "figures"

baseline:
  W: 1500
  d_p: 0
  s_p: 0
  theta: 90
  Q_total: 50
  r_flow: 0.5
  delta_W: 0.2
  pillar_config: "none"
  H: 200
