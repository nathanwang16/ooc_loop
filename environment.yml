# OoC-Optimizer Conda Environment
# Create:  conda env create -f environment.yml
# Update:  conda env update -f environment.yml --prune
# Activate: conda activate ooc

name: ooc
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - numpy>=1.24
  - scipy>=1.11
  - matplotlib>=3.7
  - pyyaml>=6.0
  - pytest>=7.4
  - tqdm>=4.66
  - pip

  - pip:
    - -e .
