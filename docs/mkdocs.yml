site_name: tumor-chip-design
site_description: >-
  Inverse design and interpretability for tumor-on-chip drug-gradient
  chambers (CFD + Bayesian optimisation + sensitivity analysis).
site_author: tumor-chip-design authors
site_url: https://ooc-loop.github.io/tumor-chip-design/
repo_url: https://github.com/ooc-loop/tumor-chip-design
repo_name: ooc-loop/tumor-chip-design
edit_uri: edit/main/docs/

docs_dir: .
# Exclude mkdocs's own config + API auto-stubs from the watchable content.
exclude_docs: |
  mkdocs.yml

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.follow
    - content.code.copy
    - content.tooltips
    - search.highlight
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    logo: material/chip

nav:
  - Home: index.md
  - Installation: installation.md
  - Quickstart: quickstart.md
  - Concepts:
      - Parametric geometry: concepts/parametric-geometry.md
      - Scalar transport: concepts/scalar-transport.md
      - Inverse design: concepts/inverse-design.md
      - Interpretability: concepts/interpretability.md
  - API reference:
      - cfd: api/cfd.md
      - geometry: api/geometry.md
      - optimization: api/optimization.md
      - interpretability: api/interpretability.md
      - validation: api/validation.md
      - analysis: api/analysis.md
      - config: api/config.md
  - Publications: publications.md
  - Changelog: ../CHANGELOG.md

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [..]
          options:
            docstring_style: numpy
            show_source: false
            show_root_heading: true
            show_signature_annotations: true
            members_order: source
            separate_signature: true
            filters: ["!^_"]

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: "¶"
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ooc-loop/tumor-chip-design
